      gain: { label: "Gain Weight / Muscle", icon: "📈", calorieAdjust: 400 },

    function calcBMI(weightKg, heightCm) {
      if (heightCm <= 0) return 0;
      const heightM = heightCm / 100;
      return parseFloat((weightKg / (heightM * heightM)).toFixed(1));
    }

    function bmiCategory(bmi) {
      if (bmi < 18.5) return { label: "Underweight", color: "text-blue-500", emoji: "🔵" };
      if (bmi < 25) return { label: "Normal", color: "text-green-500", emoji: "🟢" };
      if (bmi < 30) return { label: "Overweight", color: "text-yellow-500", emoji: "🟡" };
      return { label: "Obese", color: "text-red-500", emoji: "🔴" };
    }

    function calcBMR(weightKg, heightCm, age, gender) {
      if (gender === "female") {
        return 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
      }
      return 10 * weightKg + 6.25 * heightCm - 5 * age + 5;
    }

    function calcDailyCalories(profile) {
      const bmr = calcBMR(profile.weightKg, profile.heightCm, profile.age, profile.gender);
      const lifestyle = LIFESTYLE_INFO[profile.lifestyle] || LIFESTYLE_INFO.normal;
      const goalAdj = GOAL_INFO[profile.goal] || GOAL_INFO.maintain;
      return Math.round(bmr * lifestyle.activityFactor + goalAdj.calorieAdjust);
    }

    function calcMacroTargets(totalCalories, lifestyle, goal) {
      let proteinPct = 0.25;
      let fatPct = 0.25;
      if (lifestyle === "active" || lifestyle === "athlete") proteinPct = 0.3;
      if (goal === "gain") proteinPct = 0.3;
      if (goal === "lose") { proteinPct = 0.3; fatPct = 0.25; }
      const carbPct = 1 - proteinPct - fatPct;

      return {
        protein: Math.round((totalCalories * proteinPct) / 4),
        carbs: Math.round((totalCalories * carbPct) / 4),
        fat: Math.round((totalCalories * fatPct) / 9),
      };
    }

        if (vegOnly.length >= 3) filtered = vegOnly;

      const days = [];
      const breakfastCal = Math.round(dailyCalorieTarget * 0.25);
      const lunchCal = Math.round(dailyCalorieTarget * 0.35);
      const dinnerCal = Math.round(dailyCalorieTarget * 0.25);
      const snackCal = Math.round(dailyCalorieTarget * 0.15);

      let snackMax = snackCal + 50;
      
      if (goal === "lose") {

      }
      
      if (lifestyle === "gaming") {
        dinnerMax = Math.min(dinnerMax, 350);
      }
      
      const exerciseTargets = {
        gaming: { min: 30, sessions: 2 },
        normal: { min: 45, sessions: 2 },
        active: { min: 60, sessions: 3 },
        athlete: { min: 90, sessions: 4 },
      };
      const exTarget = exerciseTargets[lifestyle] || exerciseTargets.normal;
      const suitableExercises = EXERCISE_OPTIONS.filter(e => e.suitableFor.includes(lifestyle));
      
      const DAYS_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

      for (let i = 0; i < 7; i++) {
        const breakfastOptions = filterMeals(BREAKFAST_OPTIONS, breakfastCal + 80, breakfastCal - 100, preferVeg);
        const lunchOptions = filterMeals(LUNCH_OPTIONS, lunchCal + 100, lunchCal - 100, preferVeg);
        const dinnerOptions = filterMeals(DINNER_OPTIONS, dinnerMax, dinnerMax - 150, preferVeg);
        
        const breakfast = pickRandom(breakfastOptions);
        const lunch = pickRandom(lunchOptions);
        const dinner = pickRandom(dinnerOptions);
        
        const mealsCal = breakfast.calories + lunch.calories + dinner.calories;
        const remainingCal = dailyCalorieTarget - mealsCal;
        
        const snacks = [];
        let snackCalUsed = 0;
        const snackOptions = filterMeals(SNACK_OPTIONS, Math.min(remainingCal, snackMax), 30, preferVeg);
        
        if (remainingCal > 50 && snackOptions.length > 0) {
          const snack1 = pickRandom(snackOptions);
          snacks.push(snack1);
          snackCalUsed += snack1.calories;
          
          if (remainingCal - snackCalUsed > 80) {
            const snack2Options = snackOptions.filter(s => s.name !== snack1.name && s.calories <= remainingCal - snackCalUsed);
            if (snack2Options.length > 0) {
              snacks.push(pickRandom(snack2Options));
            }
          }
        }
        
        const dayExercises = [];
        let exMinutes = 0;
        const usedExNames = [];
        const isWeekend = i === 0 || i === 6;
        
        for (let j = 0; j < exTarget.sessions && exMinutes < exTarget.min; j++) {
          const available = suitableExercises.filter(e => 
            !usedExNames.includes(e.name) && 
            (isWeekend ? true : e.durationMinutes <= 30)
          );
          if (available.length === 0) break;
          
          const ex = pickRandom(available);
          dayExercises.push(ex);
          exMinutes += ex.durationMinutes;
          usedExNames.push(ex.name);
        }
        
        const allMeals = [breakfast, lunch, dinner, ...snacks];
        const totalCalories = allMeals.reduce((s, m) => s + m.calories, 0);
        const totalProtein = allMeals.reduce((s, m) => s + m.protein, 0);
        const totalCarbs = allMeals.reduce((s, m) => s + m.carbs, 0);
        const totalFat = allMeals.reduce((s, m) => s + m.fat, 0);
        const caloriesBurned = dayExercises.reduce((s, e) => s + e.caloriesBurned, 0);
        
        days.push({
          dayOfWeek: i,
          dayName: DAYS_NAMES[i],
          meals: { breakfast, lunch, dinner, snacks },
          exercises: dayExercises,
          totalCalories,
          totalProtein,
          totalCarbs,
          totalFat,
          exerciseMinutes: exMinutes,
          caloriesBurned,
        });
      }
      
      const totalWeekCalories = days.reduce((s, d) => s + d.totalCalories, 0);
      const totalExerciseMinutes = days.reduce((s, d) => s + d.exerciseMinutes, 0);
      
      return {
        days,
        totalWeekCalories,
        avgDailyCalories: Math.round(totalWeekCalories / 7),
        totalExerciseMinutes,
      };
    }

    function WaterTracker({ dark, water, onWaterUpdate }) {
      const TARGET = 8;
      const today = new Date().toISOString().split("T")[0];
      const glasses = water[today] || 0;

      const addGlass = () => {
        onWaterUpdate(today, glasses + 1);
      };

      const removeGlass = () => {
        if (glasses <= 0) return;
        onWaterUpdate(today, glasses - 1);
      };

      const pct = Math.min((glasses / TARGET) * 100, 100);

      return (
        <div className="glass-card p-4 mt-4">
          <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-2">
            <h3 className="font-semibold text-sm flex items-center gap-2">

              <span className="text-xs opacity-60">({glasses}/{TARGET} glasses)</span>
            </h3>
            <div className="flex gap-2">
              <button
                onClick={removeGlass}
                disabled={glasses <= 0}
                className={`text-xs py-1.5 px-3 rounded-lg font-semibold transition-all disabled:opacity-40 disabled:cursor-not-allowed ${
                  dark ? "bg-[#282828] text-gray-200 hover:bg-red-900/40" : "bg-red-50 text-red-600 hover:bg-red-100"
                }`}
              >
                − Remove Glass
              </button>
              <button
                onClick={addGlass}
                className="btn-accent text-xs py-1.5 px-3"
              >
                + Add Glass
              </button>
            </div>
          </div>
          <div className={`w-full h-3 rounded-full overflow-hidden ${dark ? "bg-[#282828]" : "bg-orange-100"}`}>
            <div
              className="h-full rounded-full transition-all duration-500 bg-gradient-to-r from-blue to-accent"
              style={{ width: `${pct}%` }}
            />
          </div>
          <div className="flex mt-2 gap-1 flex-wrap">
            {Array.from({ length: TARGET }).map((_, i) => (
              <span
                key={i}
                className={`text-xl water-drop ${i < glasses ? "filled" : "empty"}`}
                onClick={() => onWaterUpdate(today, i + 1)}

                +{glasses - TARGET} extra

            )}
          </div>
        </div>
      );

    function WeeklyPlannerTab({ dark, dailyTarget, profile, meals, exercises }) {
      const [selectedDay, setSelectedDay] = useState(new Date().getDay());

      const DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const SHORT_DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      
      const weeklyCalories = DAYS.map((_, i) =>
        meals.filter((m) => m.dayOfWeek === i).reduce((s, m) => s + m.calories, 0)
      );
      const weeklyExerciseMin = DAYS.map((_, i) =>
        exercises.filter((e) => e.dayOfWeek === i).reduce((s, e) => s + e.durationMinutes, 0)
      );

      const totalWeekCal = weeklyCalories.reduce((a, b) => a + b, 0);
      const totalWeekExMin = weeklyExerciseMin.reduce((a, b) => a + b, 0);
      const maxCal = Math.max(...weeklyCalories, 1);
      const exTarget = EXERCISE_TARGETS[profile.lifestyle] || 45;
      const macroTargets = calcMacroTargets(dailyTarget, profile.lifestyle, profile.goal);

      const daysHittingTarget = weeklyCalories.filter(
        (cal) => cal > 0 && cal <= dailyTarget * 1.1
      ).length;

      const dayMeals = meals.filter((m) => m.dayOfWeek === selectedDay);
      const dayExercises = exercises.filter((e) => e.dayOfWeek === selectedDay);
      
      const dayCal = dayMeals.reduce((s, m) => s + m.calories, 0);
      const dayProtein = dayMeals.reduce((s, m) => s + m.protein, 0);
      const dayCarbs = dayMeals.reduce((s, m) => s + m.carbs, 0);
      const dayFat = dayMeals.reduce((s, m) => s + m.fat, 0);
      const dayBurned = dayExercises.reduce((s, e) => s + e.caloriesBurned, 0);
      const dayExMin = dayExercises.reduce((s, e) => s + e.durationMinutes, 0);

      const MEAL_ICONS = { breakfast: "🌅", lunch: "☀️", dinner: "🌙", snack: "🍿" };
      const CAT_ICONS = { cardio: "🏃", strength: "💪", yoga: "🧘", sports: "⚽" };

      return (
        <div className="space-y-4">
          <div className="glass-card p-5">
            <h2 className="text-lg font-bold mb-1 flex items-center gap-2">📅 Weekly Overview</h2>
            <p className="text-xs opacity-50 mb-3">
              Target: {dailyTarget} kcal/day · {exTarget} min exercise/day
            </p>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 text-xs text-white">
              <div className="bg-gradient-to-br from-orange-400 to-orange-500 rounded-xl p-3 text-center">
                <p className="text-xl font-bold">{totalWeekCal.toLocaleString()}</p>
                <p className="text-[10px] opacity-90">Total kcal (week)</p>
              </div>
              <div className="bg-gradient-to-br from-purple-400 to-purple-500 rounded-xl p-3 text-center">
                <p className="text-xl font-bold">{totalWeekExMin}</p>
                <p className="text-[10px] opacity-90">Exercise min (week)</p>
              </div>
              <div className="bg-gradient-to-br from-green-400 to-green-500 rounded-xl p-3 text-center">
                <p className="text-xl font-bold">{daysHittingTarget}/7</p>
                <p className="text-[10px] opacity-90">Days on target</p>
              </div>
              <div className="bg-gradient-to-br from-blue-400 to-blue-500 rounded-xl p-3 text-center">
                <p className="text-xl font-bold">{Math.round(totalWeekCal / 7)}</p>
                <p className="text-[10px] opacity-90">Avg kcal/day</p>
              </div>
            </div>

            <div className="relative">
              <div className="flex items-end gap-1.5 h-24 mt-2">
                {weeklyCalories.map((cal, i) => {
                  const isOver = cal > dailyTarget;
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center gap-1">
                      <div
                        className={`w-full rounded-t-md transition-all duration-500 ${
                          i === selectedDay
                            ? "bg-gradient-to-t from-blue to-blue/70"
                            : isOver
                            ? "bg-gradient-to-t from-red-400 to-red-300"
                            : dark
                            ? "bg-[#282828]"
                            : "bg-orange-200"
                        }`}
                        style={{ height: `${Math.max((cal / maxCal) * 100, 4)}%` }}
                      />
                      <span className="text-[10px] font-semibold opacity-50">
                        {SHORT_DAYS[i]}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
            <p className="text-xs text-center mt-3 opacity-50">Daily calorie intake (kcal) — red = over target</p>
          </div>

          <div className="flex gap-1.5 overflow-x-auto pb-1">
            {DAYS.map((day, i) => {
              const dayCals = weeklyCalories[i];
              const isOver = dayCals > dailyTarget;
              return (
                <button
                  key={day}
                  onClick={() => setSelectedDay(i)}
                  className={`flex-1 min-w-[50px] py-2 px-1 rounded-lg text-xs font-semibold transition-all ${
                    i === selectedDay
                      ? "tab-active"
                      : dark
                      ? "bg-dark-card text-gray-400"
                      : "bg-white/60 text-gray-500"
                  }`}
                >
                  <div>{SHORT_DAYS[i]}</div>
                  {isOver && i !== selectedDay && <div className="text-[8px] text-red-400">⚠️</div>}
                </button>
              );
            })}
          </div>

          <div className="space-y-4 fade-in">
            <div className="glass-card p-4">
              <h3 className="font-bold mb-1">{DAYS[selectedDay]}'s Plan</h3>
              <p className="text-xs opacity-60 mb-3">
                {dayCal} / {dailyTarget} kcal intake · {dayBurned} kcal burned · Net: {dayCal - dayBurned} kcal
              </p>

              <div className={`h-3 rounded-full overflow-hidden ${dark ? "bg-dark-border" : "bg-gray-100"}`}>
                <div
                  className={`h-full rounded-full transition-all duration-500 ${
                    dayCal > dailyTarget
                      ? "bg-gradient-to-r from-red-400 to-red-500"
                      : "bg-gradient-to-r from-green-400 to-accent"
                  }`}
                  style={{ width: `${Math.min((dayCal / dailyTarget) * 100, 100)}%` }}
                />
              </div>

              <div className="grid grid-cols-3 gap-2 mt-4 text-xs">
                <div className={`rounded-lg p-2 text-center ${dark ? "bg-dark-border" : "bg-green-50"}`}>
                  <p className="font-bold text-green-500">{dayProtein}g</p>
                  <p className="opacity-50 text-[10px]">/ {macroTargets.protein}g protein</p>
                </div>
                <div className={`rounded-lg p-2 text-center ${dark ? "bg-dark-border" : "bg-blue-50"}`}>
                  <p className="font-bold text-blue">{dayCarbs}g</p>
                  <p className="opacity-50 text-[10px]">/ {macroTargets.carbs}g carbs</p>
                </div>
                <div className={`rounded-lg p-2 text-center ${dark ? "bg-dark-border" : "bg-pink-50"}`}>
                  <p className="font-bold text-pink">{dayFat}g</p>
                  <p className="opacity-50 text-[10px]">/ {macroTargets.fat}g fat</p>
                </div>
              </div>

              <div className="mt-4">
                <div className="flex justify-between text-xs mb-1">
                  <span className="opacity-60">Exercise: {dayExMin} / {exTarget} min</span>
                  <span className={dayExMin >= exTarget ? "text-accent font-semibold" : "text-primary"}>
                    {dayExMin >= exTarget ? "✓ Done!" : `${exTarget - dayExMin} min more`}
                  </span>
                </div>
                <div className={`h-2 rounded-full overflow-hidden ${dark ? "bg-dark-border" : "bg-gray-100"}`}>
                  <div
                    className={`h-full rounded-full transition-all duration-500 ${
                      dayExMin >= exTarget
                        ? "bg-gradient-to-r from-green-400 to-accent"
                        : "bg-gradient-to-r from-purple-400 to-purple-500"
                    }`}
                    style={{ width: `${Math.min((dayExMin / exTarget) * 100, 100)}%` }}
                  />
                </div>
              </div>
            </div>

            <div className="glass-card p-4">
              <h3 className="font-semibold text-sm mb-3">🥗 Meals</h3>
              {dayMeals.length === 0 ? (
                <p className="text-sm opacity-50 text-center py-4">No meals planned for {DAYS[selectedDay]}</p>
              ) : (
                <div className="space-y-2">
                  {dayMeals.map((meal) => (
                    <div
                      key={meal.id}
                      className={`flex items-center gap-3 p-2.5 rounded-lg text-xs ${
                        dark ? "bg-dark-border/50" : "bg-orange-50"
                      }`}
                    >
                      <span className="text-lg">{MEAL_ICONS[meal.mealType] || "🍽️"}</span>
                      <div className="flex-1 min-w-0">
                        <p className="font-medium text-sm truncate">
                          {meal.isVeg ? "🟢" : "🔴"} {meal.name}
                        </p>
                        <p className="opacity-50">{meal.calories} kcal · {meal.mealType}</p>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="glass-card p-4">
              <h3 className="font-semibold text-sm mb-3">🏋️ Exercises</h3>
              {dayExercises.length === 0 ? (
                <p className="text-sm opacity-50 text-center py-4">No exercises planned for {DAYS[selectedDay]}</p>
              ) : (
                <div className="space-y-2">
                  {dayExercises.map((ex) => (
                    <div
                      key={ex.id}
                      className={`flex items-center gap-3 p-2.5 rounded-lg text-xs ${
                        dark ? "bg-dark-border/50" : "bg-purple-50"
                      } ${ex.completed ? "opacity-60" : ""}`}
                    >
                      <span className="text-lg">{CAT_ICONS[ex.category] || "🏋️"}</span>
                      <div className="flex-1 min-w-0">
                        <p className={`font-medium text-sm truncate ${ex.completed ? "line-through" : ""}`}>
                          {ex.name}
                        </p>
                        <p className="opacity-50">{ex.durationMinutes} min · {ex.caloriesBurned} kcal</p>
                      </div>
                      <span className={`text-xs px-2 py-0.5 rounded-full ${

                        {ex.completed ? "✓ Done" : "Pending"}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function SmartMealApp() {
      const [activeTab, setActiveTab] = useState("activity");
      const [dark, setDark] = useState(false);
      const [profile, setProfile] = useState(null);
      const [meals, setMeals] = useState([]);
      const [exercises, setExercises] = useState([]);
      const [water, setWater] = useState({});
      const [tasks, setTasks] = useState([]);
      const [reminders, setReminders] = useState([]);
      const [health, setHealth] = useState({
        steps: 0,
        stepsGoal: 10000,
        caloriesBurned: 0,
        caloriesGoal: 500,
        activeMinutes: 0,
        activeMinutesGoal: 30,
        heartRateAvg: 0,
        heartRateMin: 0,
        heartRateMax: 0,
        sleepHours: 0,
        sleepGoal: 8,
        distance: 0,
        floorsClimbed: 0,
        source: "none",
      });

      // Synchronize dark mode class
      useEffect(() => {
        if (dark) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      }, [dark]);

      // Load data from LocalStorage
      useEffect(() => {
        try {
          const storedProfile = localStorage.getItem("profile");
          if (storedProfile) setProfile(JSON.parse(storedProfile));

          const storedMeals = localStorage.getItem("meals");
          if (storedMeals) setMeals(JSON.parse(storedMeals));

          const storedExercises = localStorage.getItem("exercises");
          if (storedExercises) setExercises(JSON.parse(storedExercises));

          const storedWater = localStorage.getItem("water");
          if (storedWater) setWater(JSON.parse(storedWater));

          const storedTasks = localStorage.getItem("tasks");
          if (storedTasks) setTasks(JSON.parse(storedTasks));

          const storedReminders = localStorage.getItem("reminders");
          if (storedReminders) {
            setReminders(JSON.parse(storedReminders));
          } else {
            const initialReminders = [
              { id: 1, title: "Morning Water Intake", description: "Keep hydrated!", time: "08:00", type: "water", isActive: true },
              { id: 2, title: "Healthy Lunch", description: "Remember to eat your greens", time: "13:00", type: "meal", isActive: true },
              { id: 3, title: "Desk Stretching", description: "Quick stretch break", time: "16:00", type: "exercise", isActive: true },
            ];
            localStorage.setItem("reminders", JSON.stringify(initialReminders));
            setReminders(initialReminders);
          }

          const storedHealth = localStorage.getItem("health-data");
          if (storedHealth) setHealth(JSON.parse(storedHealth));
        } catch (e) {
          console.error("Failed to load local storage data", e);
        }
      }, []);

      // Helpers to save data
      const saveProfile = (updatedProfile) => {
        setProfile(updatedProfile);
        localStorage.setItem("profile", JSON.stringify(updatedProfile));
      };

      const saveMeals = (updatedMeals) => {
        setMeals(updatedMeals);
        localStorage.setItem("meals", JSON.stringify(updatedMeals));
      };

      const saveExercises = (updatedExercises) => {
        setExercises(updatedExercises);
        localStorage.setItem("exercises", JSON.stringify(updatedExercises));
      };

      const saveWater = (date, glasses) => {
        const updated = { ...water, [date]: glasses };
        setWater(updated);
        localStorage.setItem("water", JSON.stringify(updated));

        // Update task progress for water
        const updatedTasks = tasks.map(t => {
          if (t.category === "water") {
            const isCompleted = glasses >= t.targetValue;
            return { ...t, currentValue: glasses, isCompleted };
          }
          return t;
        });
        setTasks(updatedTasks);
        localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      };

      // Simulated sync
      const handleSyncApp = (appId) => {
        const progressFactor = Math.min(new Date().getHours() / 18, 1);
        const baseSteps = 8000 + Math.floor(Math.random() * 6000);
        
        const simulatedData = {
          steps: Math.floor(baseSteps * progressFactor),
          stepsGoal: 10000,
          caloriesBurned: Math.floor((300 + Math.random() * 400) * progressFactor),
          caloriesGoal: 500,
          activeMinutes: Math.floor((30 + Math.random() * 60) * progressFactor),
          activeMinutesGoal: 30,
          heartRateAvg: 68 + Math.floor(Math.random() * 20),
          heartRateMin: 55 + Math.floor(Math.random() * 10),
          heartRateMax: 90 + Math.floor(Math.random() * 40),
          sleepHours: 6 + Math.random() * 3,
          sleepGoal: 8,
          distance: parseFloat(((baseSteps * progressFactor) / 1400).toFixed(2)),
          floorsClimbed: Math.floor((5 + Math.random() * 15) * progressFactor),
          source: appId,
        };

        setHealth(simulatedData);
        localStorage.setItem("health-data", JSON.stringify(simulatedData));

        if (profile) {
          saveProfile({ ...profile, healthAppConnected: appId });
        }

        // Update steps task progress
        const updatedTasks = tasks.map(t => {
          if (t.category === "steps") {
            const isCompleted = simulatedData.steps >= t.targetValue;
            return { ...t, currentValue: simulatedData.steps, isCompleted };
          }
          if (t.category === "exercise") {
            const isCompleted = simulatedData.activeMinutes >= t.targetValue;
            return { ...t, currentValue: simulatedData.activeMinutes, isCompleted };
          }
          return t;
        });
        setTasks(updatedTasks);
        localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      };

      const handleDisconnectApp = () => {
        const disconnected = {
          ...health,
          steps: 0,
          caloriesBurned: 0,
          activeMinutes: 0,
          source: "none",
        };
        setHealth(disconnected);
        localStorage.setItem("health-data", JSON.stringify(disconnected));

        if (profile) {
          saveProfile({ ...profile, healthAppConnected: "" });
        }
      };

      const handleAddManualSteps = (steps) => {
        const updatedSteps = (health.steps || 0) + steps;
        const updated = {
          ...health,
          steps: updatedSteps,
          distance: parseFloat((updatedSteps / 1400).toFixed(2)),
          source: "manual",
        };
        setHealth(updated);
        localStorage.setItem("health-data", JSON.stringify(updated));

        // Update task progress
        const updatedTasks = tasks.map(t => {
          if (t.category === "steps") {
            const isCompleted = updatedSteps >= t.targetValue;
            return { ...t, currentValue: updatedSteps, isCompleted };
          }
          return t;
        });
        setTasks(updatedTasks);
        localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      };

      // Local API replacement handlers
      const handleAddMeal = (mealForm) => {
        const newMeal = {
          id: Date.now(),
          ...mealForm,
        };
        const updated = [...meals, newMeal];
        saveMeals(updated);

        // Update log meal task progress
        const today = new Date().getDay();
        const todayCount = updated.filter(m => m.dayOfWeek === today).length;
        const updatedTasks = tasks.map(t => {
          if (t.category === "meals") {
            const isCompleted = todayCount >= t.targetValue;
            return { ...t, currentValue: todayCount, isCompleted };
          }
          return t;
        });
        setTasks(updatedTasks);
        localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      };

      const handleDeleteMeal = (id) => {
        const updated = meals.filter(m => m.id !== id);
        saveMeals(updated);

        const today = new Date().getDay();
        const todayCount = updated.filter(m => m.dayOfWeek === today).length;
        const updatedTasks = tasks.map(t => {
          if (t.category === "meals") {
            const isCompleted = todayCount >= t.targetValue;
            return { ...t, currentValue: todayCount, isCompleted };
          }
          return t;
        });
        setTasks(updatedTasks);
        localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      };

      const handleAddExercise = (exForm) => {
        const newEx = {
          id: Date.now(),
          completed: false,
          ...exForm,
        };
        const updated = [...exercises, newEx];
        saveExercises(updated);
      };

      const handleToggleCompleteExercise = (id) => {
        const updated = exercises.map(e => e.id === id ? { ...e, completed: !e.completed } : e);
        saveExercises(updated);

        // Update task progress if exercise complete
        const today = new Date().getDay();
        const totalMinutes = updated.filter(e => e.dayOfWeek === today && e.completed).reduce((s, e) => s + e.durationMinutes, 0);
        const updatedTasks = tasks.map(t => {
          if (t.category === "exercise") {
            const isCompleted = totalMinutes >= t.targetValue;
            return { ...t, currentValue: totalMinutes, isCompleted };
          }
          return t;
        });
        setTasks(updatedTasks);
        localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      };

      const handleDeleteExercise = (id) => {
        const updated = exercises.filter(e => e.id !== id);
        saveExercises(updated);
      };

      const handleAddReminder = (remForm) => {
        const newRem = {
          id: Date.now(),
          isActive: true,
          ...remForm,
        };
        const updated = [...reminders, newRem];
        setReminders(updated);
        localStorage.setItem("reminders", JSON.stringify(updated));
      };

      const handleToggleReminder = (id) => {
        const updated = reminders.map(r => r.id === id ? { ...r, isActive: !r.isActive } : r);
        setReminders(updated);
        localStorage.setItem("reminders", JSON.stringify(updated));
      };

      const handleDeleteReminder = (id) => {
        const updated = reminders.filter(r => r.id !== id);
        setReminders(updated);
        localStorage.setItem("reminders", JSON.stringify(updated));
      };

      const handleApplyWeeklyPlan = (weeklyPlan) => {
        const newMeals = [...meals];
        const newExercises = [...exercises];
        const newTasks = [];

        weeklyPlan.days.forEach(day => {
          // Add meals
          const dayMeals = [
            { id: Date.now() + Math.random(), name: day.meals.breakfast.name, calories: day.meals.breakfast.calories, protein: day.meals.breakfast.protein, carbs: day.meals.breakfast.carbs, fat: day.meals.breakfast.fat, isVeg: day.meals.breakfast.isVeg, mealType: "breakfast", dayOfWeek: day.dayOfWeek, notes: "From SmartMeal Plan" },
            { id: Date.now() + Math.random(), name: day.meals.lunch.name, calories: day.meals.lunch.calories, protein: day.meals.lunch.protein, carbs: day.meals.lunch.carbs, fat: day.meals.lunch.fat, isVeg: day.meals.lunch.isVeg, mealType: "lunch", dayOfWeek: day.dayOfWeek, notes: "From SmartMeal Plan" },
            { id: Date.now() + Math.random(), name: day.meals.dinner.name, calories: day.meals.dinner.calories, protein: day.meals.dinner.protein, carbs: day.meals.dinner.carbs, fat: day.meals.dinner.fat, isVeg: day.meals.dinner.isVeg, mealType: "dinner", dayOfWeek: day.dayOfWeek, notes: "From SmartMeal Plan" },
          ];
          day.meals.snacks.forEach((snack, idx) => {
            dayMeals.push({ id: Date.now() + Math.random(), name: snack.name, calories: snack.calories, protein: snack.protein, carbs: snack.carbs, fat: snack.fat, isVeg: snack.isVeg, mealType: "snack", dayOfWeek: day.dayOfWeek, notes: "From SmartMeal Plan" });
          });
          newMeals.push(...dayMeals);

          // Add exercises
          day.exercises.forEach(ex => {
            newExercises.push({
              id: Date.now() + Math.random(),
              name: ex.name,
              category: ex.category,
              durationMinutes: ex.durationMinutes,
              caloriesBurned: ex.caloriesBurned,
              dayOfWeek: day.dayOfWeek,
              completed: false
            });
          });

          // Add daily tasks templates
          const taskTemplates = [
            { id: Date.now() + Math.random(), title: "Daily Steps", category: "steps", targetValue: 10000, currentValue: 0, unit: "steps", isCompleted: false, dayOfWeek: day.dayOfWeek },
            { id: Date.now() + Math.random(), title: "Drink Water", category: "water", targetValue: 8, currentValue: 0, unit: "glasses", isCompleted: false, dayOfWeek: day.dayOfWeek },
            { id: Date.now() + Math.random(), title: "Exercise", category: "exercise", targetValue: day.exerciseMinutes || 30, currentValue: 0, unit: "min", isCompleted: false, dayOfWeek: day.dayOfWeek },
            { id: Date.now() + Math.random(), title: "Log Meals", category: "meals", targetValue: 3, currentValue: 0, unit: "meals", isCompleted: false, dayOfWeek: day.dayOfWeek },
          ];
          newTasks.push(...taskTemplates);
        });

        saveMeals(newMeals);
        saveExercises(newExercises);
        setTasks(newTasks);
        localStorage.setItem("tasks", JSON.stringify(newTasks));
      };

      const dailyCalorieTarget = profile ? calcDailyCalories(profile) : 2000;
      const today = new Date().getDay();
      
      const todayMeals = meals.filter(m => m.dayOfWeek === today);
      const todayCalories = todayMeals.reduce((sum, m) => sum + m.calories, 0);

      const todayExercises = exercises.filter(e => e.dayOfWeek === today && e.completed);
      const todayBurned = todayExercises.reduce((sum, e) => sum + e.caloriesBurned, 0);

      const activeTasks = tasks.filter(t => t.dayOfWeek === today);
      const activeReminders = reminders.filter(r => r.isActive);

      if (!profile) {
        return (
          <ProfileSetup
            dark={dark}
            existingProfile={profile}
            onComplete={(p) => {
              saveProfile(p);
              // Setup default tasks for today
              const todayDow = new Date().getDay();
              const initialTasks = [
                { id: Date.now() + 1, title: "Daily Steps", category: "steps", targetValue: 10000, currentValue: 0, unit: "steps", isCompleted: false, dayOfWeek: todayDow },
                { id: Date.now() + 2, title: "Drink Water", category: "water", targetValue: 8, currentValue: 0, unit: "glasses", isCompleted: false, dayOfWeek: todayDow },
                { id: Date.now() + 3, title: "Exercise", category: "exercise", targetValue: 30, currentValue: 0, unit: "min", isCompleted: false, dayOfWeek: todayDow },
                { id: Date.now() + 4, title: "Log Meals", category: "meals", targetValue: 3, currentValue: 0, unit: "meals", isCompleted: false, dayOfWeek: todayDow },
              ];
              setTasks(initialTasks);
              localStorage.setItem("tasks", JSON.stringify(initialTasks));
            }}
          />
        );
      }

      return (
        <div className={`min-h-screen pb-12 transition-colors duration-500 ${
          dark ? "bg-[#000000] text-white" : "bg-[#f5f5f5] text-gray-900"
        }`}>
          <div className="max-w-[860px] mx-auto px-4 py-6">
            <div className="fade-in stagger-1">
              <Header dark={dark} setDark={setDark} activeTab={activeTab} setActiveTab={setActiveTab} />
            </div>

            <div className="fade-in stagger-2 mt-4">
              <ProfileCard
                profile={profile}
                dark={dark}
                onEdit={() => saveProfile(null)}
                todayCalories={todayCalories}
                todayBurned={todayBurned}
                onOpenProfile={() => setActiveTab("profile")}
              />
            </div>

            <div className="fade-in stagger-3 mt-4">
              <WaterTracker dark={dark} water={water} onWaterUpdate={saveWater} />
            </div>
            
            <div className="fade-in stagger-4 mt-6 min-h-[500px]">
              {activeTab === "profile" && (
                <ProfileTab
                  dark={dark}
                  profile={profile}
                  onEdit={() => saveProfile(null)}
                  meals={meals}
                  exercises={exercises}
                  water={water}
                />
              )}
              {activeTab === "activity" && (
                <ActivityTab
                  dark={dark}
                  profile={profile}
                  health={health}
                  onSyncApp={handleSyncApp}
                  onDisconnectApp={handleDisconnectApp}
                  onAddManualSteps={handleAddManualSteps}
                  tasks={activeTasks}
                  onUpdateTask={(id, val) => {
                    const updated = tasks.map(t => t.id === id ? { ...t, currentValue: val, isCompleted: val >= t.targetValue } : t);
                    setTasks(updated);
                    localStorage.setItem("tasks", JSON.stringify(updated));
                  }}
                  reminders={activeReminders}
                />
              )}
              {activeTab === "myplan" && (
                <MyPlanTab
                  dark={dark}
                  profile={profile}
                  onApplyPlan={handleApplyWeeklyPlan}
                />
              )}
              {activeTab === "diet" && (
                <DietTab
                  dark={dark}
                  dailyTarget={dailyCalorieTarget}
                  profile={profile}
                  meals={meals}
                  onAddMeal={handleAddMeal}
                  onDeleteMeal={handleDeleteMeal}
                />
              )}
              {activeTab === "exercise" && (
                <ExerciseTab
                  dark={dark}
                  profile={profile}
                  exercises={exercises}
                  onAddExercise={handleAddExercise}
                  onToggleCompleteExercise={handleToggleCompleteExercise}
                  onDeleteExercise={handleDeleteExercise}
                />
              )}
              {activeTab === "reminders" && (
                <RemindersTab
                  dark={dark}
                  reminders={reminders}
                  onAddReminder={handleAddReminder}
                  onToggleReminder={handleToggleReminder}
                  onDeleteReminder={handleDeleteReminder}
                />
              )}
              {activeTab === "planner" && (
                <WeeklyPlannerTab
                  dark={dark}
                  dailyTarget={dailyCalorieTarget}
                  profile={profile}
                  meals={meals}
                  exercises={exercises}
                />
              )}
            </div>

            <footer className="text-center mt-16 pb-8 opacity-50 text-sm font-medium hover:opacity-100 transition-opacity">
              <p>🇮🇳 SmartMeal India — Eat Healthy, Live Happy</p>
            </footer>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<SmartMealApp />);
  </script>
</body>
</html>
